aae # ============================================================
# DigitalADbird CRM — Nginx Reverse Proxy Configuration
# ============================================================
# Place this file at: /etc/nginx/sites-available/crm.conf
# Then: sudo ln -s /etc/nginx/sites-available/crm.conf /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# SSL: After DNS points to your VPS IP, run:
#   sudo certbot --nginx -d crm.digitaladbird.com
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/s;

# Upstream definitions
upstream crm_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream crm_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crm.digitaladbird.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.digitaladbird.com;

    # ---------- SSL (Certbot will auto-fill these) ----------
    # ssl_certificate /etc/letsencrypt/live/crm.digitaladbird.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.digitaladbird.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---------- Security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---------- Logging ----------
    access_log /var/log/nginx/crm_access.log;
    error_log  /var/log/nginx/crm_error.log;

    # ---------- Body size limit ----------
    client_max_body_size 10M;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ---------- Meta Webhook (special — needs raw body, high rate) ----------
    location /webhooks/meta {
        limit_req zone=webhook_limit burst=100 nodelay;

        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Important: don't buffer webhook bodies (HMAC verification needs raw bytes)
        proxy_request_buffering off;
        proxy_read_timeout 30s;
    }

    # ---------- Auth API (tighter rate limit) ----------
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---------- API routes → Backend ----------
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------- Socket.IO (WebSocket for real-time chat) ----------
    location /socket.io/ {
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ---------- Health check (no rate limit) ----------
    location /health {
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---------- Frontend (Next.js) — everything else ----------
    location / {
        proxy_pass http://crm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ---------- Next.js static assets (long cache) ----------
    location /_next/static/ {
        proxy_pass http://crm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- Deny dotfiles ----------
    location ~ /\. {
        deny all;
        return 404;
    }
}
